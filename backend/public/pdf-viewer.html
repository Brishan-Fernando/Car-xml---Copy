<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDF Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #525659; font-family: system-ui, sans-serif; overflow: hidden; }

  #toolbar {
    position: fixed; top: 0; left: 0; right: 0; height: 40px;
    background: #323639; display: flex; align-items: center; gap: 6px;
    padding: 0 10px; z-index: 100; border-bottom: 2px solid #1a1a1a;
    color: #fff; font-size: 12px; flex-shrink: 0;
  }
  #toolbar input {
    flex: 1; max-width: 220px; padding: 5px 10px; border-radius: 6px;
    border: 1px solid #555; background: #444; color: #fff;
    font-size: 12px; outline: none;
  }
  #toolbar input:focus { border-color: #667eea; }
  #toolbar button {
    padding: 4px 10px; border-radius: 5px; border: none;
    background: #555; color: #fff; cursor: pointer; font-size: 11px;
    transition: background 0.15s;
  }
  #toolbar button:hover { background: #667eea; }
  #toolbar button:disabled { background: #3a3a3a; color: #666; cursor: default; }
  #match-info { font-size: 11px; color: #aaa; min-width: 70px; text-align: center; }
  #page-count { font-size: 11px; color: #aaa; margin-left: auto; }

  #viewer {
    position: absolute; top: 40px; bottom: 0; left: 0; right: 0;
    overflow-y: auto; padding: 12px; display: flex; flex-direction: column;
    align-items: center; gap: 10px;
  }

  .page-wrap {
    position: relative; display: inline-block;
    box-shadow: 0 2px 16px rgba(0,0,0,0.5); background: #fff;
    line-height: 0;
  }
  .page-wrap canvas { display: block; }

  .text-layer {
    position: absolute; top: 0; left: 0; overflow: hidden;
    pointer-events: auto; user-select: text;
  }
  .text-layer span {
    position: absolute; color: transparent; white-space: pre;
    transform-origin: 0% 0%; cursor: text;
  }
  .text-layer span.hl {
    background: rgba(255, 200, 0, 0.45);
    border-radius: 2px;
  }
  .text-layer span.hl-active {
    background: rgba(255, 100, 0, 0.65);
    border-radius: 2px;
  }

  #loading {
    color: #bbb; font-size: 14px; padding: 60px 20px; text-align: center;
  }
  #error { color: #f87171; font-size: 13px; padding: 40px; text-align: center; }
</style>
</head>
<body>

<div id="toolbar">
  <input id="search-box" type="text" placeholder="Search in PDF…" autocomplete="off" />
  <button id="prev-btn" disabled>◀</button>
  <span id="match-info"></span>
  <button id="next-btn" disabled>▶</button>
  <span id="page-count"></span>
</div>
<div id="viewer"><div id="loading">Loading PDF…</div></div>

<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

const params   = new URLSearchParams(location.search);
const fileUrl  = params.get('file');
const initTerm = params.get('search') || '';

const viewer    = document.getElementById('viewer');
const searchBox = document.getElementById('search-box');
const matchInfo = document.getElementById('match-info');
const pageCount = document.getElementById('page-count');
const prevBtn   = document.getElementById('prev-btn');
const nextBtn   = document.getElementById('next-btn');

if (initTerm) searchBox.value = initTerm;

// ── State ─────────────────────────────────────────────────────────────
let pdfDoc       = null;
let allSpans     = [];   // [{span, text, pageNum}]
let matches      = [];   // indices into allSpans
let matchIdx     = -1;

// ── Render all pages ─────────────────────────────────────────────────
async function renderAll() {
  if (!fileUrl) {
    viewer.innerHTML = '<div id="error">No PDF file specified.</div>';
    return;
  }
  try {
    pdfDoc = await pdfjsLib.getDocument(fileUrl).promise;
    viewer.innerHTML = '';
    allSpans = [];
    pageCount.textContent = `${pdfDoc.numPages} page${pdfDoc.numPages !== 1 ? 's' : ''}`;

    const SCALE = 1.5;
    for (let p = 1; p <= pdfDoc.numPages; p++) {
      const page     = await pdfDoc.getPage(p);
      const viewport = page.getViewport({ scale: SCALE });

      const wrap  = document.createElement('div');
      wrap.className = 'page-wrap';
      wrap.dataset.page = p;
      wrap.style.width  = viewport.width  + 'px';
      wrap.style.height = viewport.height + 'px';

      // Canvas
      const canvas = document.createElement('canvas');
      canvas.width  = viewport.width;
      canvas.height = viewport.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

      // Text layer
      const tl = document.createElement('div');
      tl.className = 'text-layer';
      tl.style.width  = viewport.width  + 'px';
      tl.style.height = viewport.height + 'px';

      const content = await page.getTextContent();
      content.items.forEach(item => {
        if (!item.str) return;
        const tx  = pdfjsLib.Util.transform(viewport.transform, item.transform);
        const fh  = Math.sqrt(tx[2] * tx[2] + tx[3] * tx[3]);
        const sp  = document.createElement('span');
        sp.textContent = item.str;
        sp.style.fontSize  = fh  + 'px';
        sp.style.left      = tx[4] + 'px';
        sp.style.top       = (tx[5] - fh) + 'px';
        if (item.width > 0) sp.style.width = (item.width * SCALE) + 'px';
        tl.appendChild(sp);
        allSpans.push({ span: sp, text: item.str, pageNum: p });
      });

      wrap.appendChild(canvas);
      wrap.appendChild(tl);
      viewer.appendChild(wrap);
    }

    if (initTerm) performSearch(initTerm);

  } catch (e) {
    viewer.innerHTML = `<div id="error">Failed to load PDF:<br>${e.message}</div>`;
  }
}

// ── Search ────────────────────────────────────────────────────────────
function performSearch(term) {
  // Clear old highlights
  allSpans.forEach(({ span }) => span.classList.remove('hl', 'hl-active'));
  matches  = [];
  matchIdx = -1;

  const q = (term || '').trim().toLowerCase();
  if (!q) { matchInfo.textContent = ''; updateBtns(); return; }

  allSpans.forEach((item, i) => {
    if (item.text.toLowerCase().includes(q)) {
      item.span.classList.add('hl');
      matches.push(i);
    }
  });

  if (matches.length === 0) {
    matchInfo.textContent = 'No matches';
  } else {
    matchIdx = 0;
    activateMatch(0);
  }
  updateBtns();
}

function activateMatch(idx) {
  // Deactivate old
  if (matchIdx >= 0 && matches[matchIdx] !== undefined) {
    allSpans[matches[matchIdx]].span.classList.remove('hl-active');
  }
  matchIdx = ((idx % matches.length) + matches.length) % matches.length;
  const { span } = allSpans[matches[matchIdx]];
  span.classList.add('hl-active');
  span.scrollIntoView({ behavior: 'smooth', block: 'center' });
  matchInfo.textContent = `${matchIdx + 1} / ${matches.length}`;
}

function updateBtns() {
  prevBtn.disabled = matches.length < 2;
  nextBtn.disabled = matches.length < 2;
}

// ── Event listeners ───────────────────────────────────────────────────
searchBox.addEventListener('keydown', e => {
  if (e.key === 'Enter') performSearch(searchBox.value);
});
prevBtn.addEventListener('click', () => activateMatch(matchIdx - 1));
nextBtn.addEventListener('click', () => activateMatch(matchIdx + 1));

// ── postMessage from parent (for live search without reload) ──────────
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'pdf-search') {
    const term = e.data.term || '';
    searchBox.value = term;
    // Wait until PDF is rendered
    if (allSpans.length > 0) {
      performSearch(term);
    } else {
      // Store and apply once rendering finishes — handled by initTerm equivalent
      const wait = setInterval(() => {
        if (allSpans.length > 0) { clearInterval(wait); performSearch(term); }
      }, 200);
    }
  }
});

renderAll();
</script>
</body>
</html>
